; PHP-FPM per-directory overrides for the dashboard.
;
; The web host moved from Apache (mod_php) to Caddy + PHP-FPM. Caddy does NOT
; read .htaccess, so the `php_value` directives in dashboard/.htaccess stopped
; applying. This file is the PHP-FPM equivalent and fully replaces that .htaccess.
;
; PHP re-reads .user.ini per directory every `user_ini.cache_ttl` seconds
; (default 300s / 5 min), so changes take effect without an FPM restart. It
; applies to this directory and everything beneath it (including /api), because
; PHP walks from the requested script's directory up to the document root. Only
; PHP_INI_PERDIR / PHP_INI_USER settings are honoured here — all three qualify.

; Uploads — mirror the old .htaccess so behaviour matches pre-Caddy.
upload_max_filesize = 200M
post_max_size = 200M

; Search path for bare includes. Needed because some pages (e.g.
; api/module_data_post.php) do `include 'file_paths.php'`, expecting it to
; resolve from /var/www/dashboard/includes. Without this entry that include
; falls back to the default path and fails under Caddy.
include_path = ".:/var/www/dashboard/includes:/usr/share/php"
