<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BotOfTheSpecter Panel</title>
    <script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
    <style>
        :root {
            --bg-base:        #0d0d0f;
            --bg-surface:     #141418;
            --bg-card:        #1a1a20;
            --bg-card-hover:  #1f1f27;
            --accent:         #7c5cbf;
            --accent-hover:   #9070d8;
            --accent-light:   rgba(124, 92, 191, 0.12);
            --text-primary:   #e8e8f0;
            --text-secondary: #a8a8bc;
            --text-muted:     #6c6c84;
            --border:         rgba(255, 255, 255, 0.07);
            --border-hover:   rgba(255, 255, 255, 0.14);
            --green:          #3ecf8e;
            --blue:           #5cb8ff;
            --red:            #f87171;
            --radius:         6px;
            --radius-lg:      10px;
            --transition:     150ms ease;
        }
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; height: 100%; }
        body {
            background: var(--bg-base);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            font-size: 14px;
            line-height: 1.5;
        }
        .ext-container { padding: 0.85rem; }
        .ext-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0 0 0.35rem;
        }
        .ext-subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin: 0 0 0.85rem;
        }
        .ext-section-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0.85rem 0 0.4rem;
        }
        .ext-muted { color: var(--text-muted); }
        .ext-danger { color: var(--red); }
        .ext-button-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            justify-content: center;
            margin-bottom: 0.85rem;
        }
        .ext-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.35rem 0.7rem;
            font-size: 0.78rem;
            font-weight: 600;
            border-radius: var(--radius);
            border: 1px solid transparent;
            cursor: pointer;
            font-family: inherit;
            line-height: 1.3;
            white-space: nowrap;
            transition: background var(--transition), border-color var(--transition), color var(--transition);
        }
        .ext-btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .ext-btn-primary:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
        }
        .ext-btn-link {
            background: transparent;
            color: var(--accent-hover);
            border-color: var(--border);
        }
        .ext-btn-link:hover {
            background: var(--accent-light);
            color: var(--text-primary);
            border-color: var(--border-hover);
        }
        .ext-table-wrap {
            overflow-x: auto;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            margin-top: 0.5rem;
        }
        .ext-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.78rem;
        }
        .ext-table thead th {
            background: var(--bg-surface);
            color: var(--text-muted);
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 700;
            padding: 0.45rem 0.55rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        .ext-table tbody td {
            padding: 0.4rem 0.55rem;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        .ext-table tbody tr:nth-child(odd) { background: rgba(255, 255, 255, 0.02); }
        .ext-table tbody tr:last-child td { border-bottom: none; }
        .ext-meta { font-weight: 700; color: var(--text-primary); }
    </style>
</head>
<body>
    <div class="ext-container">
        <h2 class="ext-title">BotOfTheSpecter Panel</h2>
        <p class="ext-subtitle">This panel is in heavy development</p>
        <p id="viewer-welcome"></p>
    </div>
    <script src="panel.js?v=3"></script>
</body>
</html>
